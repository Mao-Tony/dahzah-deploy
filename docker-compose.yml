version: '3.8'

# 全程使用阿里云镜像加速，无需额外配置 Docker daemon

services:
  # ==================== 后端服务 ====================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dahzah-backend
    ports:
      - "8000:8000"
    environment:
      APP_NAME: dahzah-backend
      APP_ENV: ${APP_ENV:-production}
      DEBUG: ${DEBUG:-false}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-dazah}
      REDIS_URL: redis://redis:6379/0
      AUDIT_RETENTION_DAYS: ${AUDIT_RETENTION_DAYS:-7}
      # MiniMax AI
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      MINIMAX_BASE_URL: ${MINIMAX_BASE_URL:-}
      MINIMAX_MODEL: ${MINIMAX_MODEL:-}
      # 飞书配置
      FEISHU_APP_ID: ${FEISHU_APP_ID:-}
      FEISHU_APP_SECRET: ${FEISHU_APP_SECRET:-}
      FEISHU_BOT_CHAT_ID: ${FEISHU_BOT_CHAT_ID:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend-uploads:/app/uploads
      - backend-logs:/app/logs
    restart: unless-stopped
    # 资源限制 (根据服务器配置调整)
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    command: >
      sh -c "uv run alembic upgrade head &&
             uv run uvicorn app.main:app --host 0.0.0.0 --port 8000"

  # ==================== 前端服务 ====================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:8000/api/v1}
    container_name: dahzah-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:8000/api/v1}
      NODE_ENV: production
    depends_on:
      - backend
    volumes:
      - frontend-uploads:/app/public/uploads
    restart: unless-stopped
    # 资源限制 (根据服务器配置调整)
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # ==================== 数据库 (阿里云) ====================
  db:
    image: registry.cn-hangzhou.aliyuncs.com/acs/postgres:17
    container_name: dahzah-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-dazah}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-dazah}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # 资源限制
    deploy:
      resources:
        limits:
          memory: 1G

  # ==================== Redis (阿里云) ====================
  redis:
    image: registry.cn-hangzhou.aliyuncs.com/acs/redis:latest
    container_name: dahzah-redis
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redisdata:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # 资源限制
    deploy:
      resources:
        limits:
          memory: 256M

  # ==================== Nginx 反向代理 (阿里云) ====================
  nginx:
    image: registry.cn-hangzhou.aliyuncs.com/acs/nginx:alpine
    container_name: dahzah-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  backend-uploads:
  backend-logs:
  frontend-uploads:
  nginx-logs:
